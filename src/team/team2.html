<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team2</title>

  <!-- swiper css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />

  <!-- box icons -->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

  <!-- custom css -->
  <link rel="stylesheet" type="text/css" href="style2.css">
</head>

<body>
  <section>
    <h2 class="team-title">Meet the Team</h2>
    <a>TOGETHER, WE CULTIVATE SUCCESS</a>

  <div class="container">
    <div class="box mySwiper">
      <div class="content swiper-wrapper">
        <!-- Each slide is a .swiper-slide element -->
        <div class="card swiper-slide">
          <div class="card-content">
            <div class="image">
              <img src="/img/team/Member1.png" alt="">

            </div>

            <div class="name-profession">
              <span class="name">NAVANEETH H R</span>
              <span class="profession">3rd year-CSE</span>
            </div>

            <button style="--clr:#ff0f5b">CEO</button>
          </div>
        </div>

        <div class="card swiper-slide">
          <div class="card-content">
            <div class="image">
              <img src="/img/team/Member2.png" alt="">
            </div>

            <div class="name-profession">
              <span class="name">YASHASWINI S</span>
              <span class="profession">3rd year-CSE</span>
            </div>

            <button style="--clr:#be01fe">COO</button>
          </div>
        </div>

        <div class="card swiper-slide">
          <div class="card-content">
            <div class="image">
              <img src="/img/team/Member3.jpg" alt="">
            </div>

            <div class="name-profession">
              <span class="name">RAVI KIRAN K</span>
              <span class="profession">3rd year-CSE</span>
            </div>

            <button style="--clr:#fea401">CTO</button>
          </div>
        </div>

        <div class="card swiper-slide">
          <div class="card-content">
            <div class="image">
              <img src="/img/team/Member4.jpg" alt="">
            </div>

            <div class="name-profession">
              <span class="name">SHASHANK N</span>
              <span class="profession">3rd year-CSE</span>
            </div>
            <button style="--clr:#ff0f5b">CTO</button>
          </div>
        </div>
        
        <!-- Add more slides if necessary -->
      </div>
    </div>
  </div>

  <!-- swiper js -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>

  <script>
    const swiper = new Swiper('.mySwiper', {
      slidesPerView: 4,  // This shows 4 slides at a time
      spaceBetween: 30,   // Space between slides
      loop: true,         // Loop the slides
      pagination: {
        el: '.swiper-pagination',
        clickable: true,
      },
      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },
    });
  </script>
</section>
</body>

</html>
